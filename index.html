<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deriv Last Digit Signal Monitor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #12151c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #1e222d;
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #f8fafc;
      text-align: center;
      margin-bottom: 6px;
    }

    .status-bar {
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 20px;
      color: #94a3b8;
    }

    .status-online { color: #22c55e; }
    .status-offline { color: #ef4444; }

    /* Digits Grid */
    .digit-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .digit-box {
      background-color: #2a2e3d;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .digit-number {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .digit-pct {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    /* Target highlight for 0, 1, 2, 3 */
    .digit-box.target-under {
      background-color: rgba(239, 68, 68, 0.15);
      border-color: #ef4444;
    }

    .digit-box.target-under .digit-pct {
      color: #ef4444;
      font-weight: bold;
    }

    /* Signal Card */
    .signal-box {
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      background-color: #2a2e3d;
      color: #64748b;
      border: 2px dashed #475569;
    }

    .signal-box.TRIGGERED {
      background-color: #15803d;
      color: #ffffff;
      border: 2px solid #22c55e;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0px #22c55e; }
      100% { transform: scale(1.02); box-shadow: 0 0 15px #22c55e; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Volatility 75 Index — Digit Monitor</h2>
    <div class="status-bar" id="connection-status">Connecting...</div>

    <!-- Digits Grid -->
    <div class="digit-grid" id="digit-grid"></div>

    <!-- Signal Banner -->
    <div class="signal-box" id="signal-box">
      INITIALIZING...
    </div>
  </div>

  <script>
    const APP_ID = '1089';
    const SYMBOL = 'R_75';
    const STATS_PERIOD = 100;

    let tickHistory = [];
    let ws;
    let pingInterval;

    // Render Digits Grid 0 to 9
    const gridContainer = document.getElementById('digit-grid');
    for (let i = 0; i <= 9; i++) {
      const box = document.createElement('div');
      box.className = 'digit-box';
      box.id = `digit-${i}`;
      box.innerHTML = `
        <div class="digit-number">${i}</div>
        <div class="digit-pct" id="pct-${i}">0.0%</div>
      `;
      gridContainer.appendChild(box);
    }

    function connectWebSocket() {
      ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

      ws.onopen = () => {
        document.getElementById('connection-status').innerHTML = 'Status: <span class="status-online">Connected</span>';
        
        // 1. Fetch initial 100 historical ticks right away so it populates immediately
        ws.send(JSON.stringify({
          ticks_history: SYMBOL,
          count: STATS_PERIOD,
          end: 'latest',
          style: 'ticks'
        }));

        // 2. Subscribe to live stream ticks
        ws.send(JSON.stringify({
          ticks: SYMBOL,
          subscribe: 1
        }));

        // 3. Keep connection alive with a ping every 30 seconds
        clearInterval(pingInterval);
        pingInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ ping: 1 }));
          }
        }, 30000);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        // Handle Historical Ticks Payload
        if (data.msg_type === 'history') {
          const prices = data.history.prices;
          tickHistory = prices.map(p => parseLastDigit(p));
          calculatePercentages();
        }

        // Handle Live Tick Streaming
        if (data.msg_type === 'tick') {
          const lastDigit = parseLastDigit(data.tick.quote);
          tickHistory.push(lastDigit);
          if (tickHistory.length > STATS_PERIOD) {
            tickHistory.shift();
          }
          calculatePercentages();
        }
      };

      ws.onclose = () => {
        document.getElementById('connection-status').innerHTML = 'Status: <span class="status-offline">Disconnected. Reconnecting...</span>';
        clearInterval(pingInterval);
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = (err) => {
        console.error("WS Error:", err);
      };
    }

    function parseLastDigit(price) {
      // Formats quote reliably regardless of trailing zeroes
      const str = Number(price).toFixed(4); 
      return parseInt(str.slice(-1));
    }

    function calculatePercentages() {
      const total = tickHistory.length;
      if (total === 0) return;

      const counts = Array(10).fill(0);
      tickHistory.forEach(digit => counts[digit]++);

      const percentages = counts.map(count => (count / total) * 100);

      // Update Digit Boxes UI
      for (let i = 0; i <= 9; i++) {
        const pct = percentages[i];
        const pctElement = document.getElementById(`pct-${i}`);
        const boxElement = document.getElementById(`digit-${i}`);

        pctElement.textContent = `${pct.toFixed(1)}%`;

        // Target highlight for 0, 1, 2, 3 under 10%
        if (i <= 3 && pct < 10.0) {
          boxElement.classList.add('target-under');
        } else {
          boxElement.classList.remove('target-under');
        }
      }

      // Signal Condition: Digits 0, 1, 2, AND 3 are ALL below 10%
      const conditionMet = percentages[0] < 10.0 && 
                           percentages[1] < 10.0 && 
                           percentages[2] < 10.0 && 
                           percentages[3] < 10.0;

      updateSignal(conditionMet);
    }

    function updateSignal(isMet) {
      const signalBox = document.getElementById('signal-box');
      if (isMet && tickHistory.length >= STATS_PERIOD) {
        signalBox.className = 'signal-box TRIGGERED';
        signalBox.innerHTML = '🚨 BUY SIGNAL ACTIVE! 🚨<br><span style="font-size:0.85rem">0, 1, 2, 3 are ALL &lt; 10%</span>';
      } else {
        signalBox.className = 'signal-box';
        signalBox.textContent = tickHistory.length < STATS_PERIOD 
          ? `LOADING TICKS (${tickHistory.length}/${STATS_PERIOD})` 
          : 'WAITING FOR CONDITION...';
      }
    }

    // Launch
    connectWebSocket();
  </script>
</body>
</html>
