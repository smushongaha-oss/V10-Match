<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Digit Signal</title>
<style>
  :root{
    --bg:#0A0E1A;
    --panel:#121729;
    --panel-2:#171D34;
    --line:#232B47;
    --text:#E7EAF3;
    --muted:#7C88A8;
    --blue:#3B82F6;
    --blue-dim:#1E3A6D;
    --green:#22C55E;
    --red:#EF4444;
    --amber:#F5A524;
    --mono:'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #0F1526 0%, var(--bg) 60%);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .wrap{width:100%;max-width:460px;}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .top h1{font-size:15px;font-weight:600;letter-spacing:.02em;margin:0;}
  .top h1 span{color:var(--muted);font-weight:400;}
  .status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 0 0 rgba(239,68,68,.5);}
  .dot.live{background:var(--green);animation:pulse 1.8s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}
    70%{box-shadow:0 0 0 7px rgba(34,197,94,0);}
    100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
  }

  .controls{display:flex;gap:8px;margin-bottom:18px;}
  select, .tickset{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:10px;
    padding:10px 12px;
    font-family:var(--mono);
    font-size:13px;
    flex:1;
  }
  select:focus{outline:1px solid var(--blue);}
  select:disabled{opacity:.5;}

  .price-card{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    border-radius:18px;
    padding:24px 20px;
    text-align:center;
    margin-bottom:16px;
  }
  .last-digit{
    width:72px;height:72px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;
    font-family:var(--mono);font-size:30px;font-weight:600;
    background:var(--blue-dim);
    border:2px solid var(--blue);
    color:#fff;
    transition:all .25s ease;
  }
  .price{font-family:var(--mono);font-size:22px;letter-spacing:.02em;color:var(--muted);}
  .price b{color:var(--text);}

  .signal-card{
    border-radius:18px;
    padding:18px 20px;
    margin-bottom:16px;
    border:1px solid var(--line);
    background:var(--panel);
    transition:all .3s ease;
  }
  .signal-card.active{
    border-color:var(--green);
    background:linear-gradient(180deg, rgba(34,197,94,.10), var(--panel) 70%);
  }
  .signal-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
  .signal-main{display:flex;align-items:center;justify-content:space-between;}
  .signal-text{font-size:15px;font-weight:600;}
  .signal-text .digit{color:var(--green);font-family:var(--mono);}
  .signal-text.none{color:var(--muted);font-weight:400;}
  .badge{
    font-family:var(--mono);font-size:12px;font-weight:600;
    padding:4px 10px;border-radius:8px;
    background:rgba(34,197,94,.15);color:var(--green);
    border:1px solid rgba(34,197,94,.35);
  }
  .badge.off{background:rgba(124,136,168,.12);color:var(--muted);border-color:var(--line);}
  .signal-reason{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.5;}

  .grid{
    display:grid;grid-template-columns:repeat(5,1fr);
    gap:8px;margin-bottom:18px;
  }
  .cell{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 4px;
    text-align:center;
    transition:all .25s ease;
    position:relative;
  }
  .cell .d{font-family:var(--mono);font-size:19px;font-weight:600;}
  .cell .p{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;}
  .cell.eligible{border-color:var(--blue-dim);}
  .cell.picked{
    border-color:var(--green);
    background:rgba(34,197,94,.10);
  }
  .cell.picked .d{color:var(--green);}
  .cell.picked .p{color:var(--green);}
  .cell.picked::after{
    content:'';
    position:absolute;inset:-1px;
    border-radius:12px;
    border:1px solid var(--green);
    animation:ring 1.6s infinite;
  }
  @keyframes ring{
    0%{opacity:.9;transform:scale(1);}
    100%{opacity:0;transform:scale(1.12);}
  }

  .footer{
    display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:11px;color:var(--muted);
    padding-top:6px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <h1>Last Digit Signal <span>· 0–3 lowest</span></h1>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">connecting</span></div>
  </div>

  <div class="controls">
    <select id="symbol" disabled>
      <option value="">loading symbols…</option>
    </select>
    <select id="sampleSize">
      <option value="50">last 50 ticks</option>
      <option value="100" selected>last 100 ticks</option>
      <option value="250">last 250 ticks</option>
      <option value="500">last 500 ticks</option>
    </select>
  </div>

  <div class="price-card">
    <div class="last-digit" id="lastDigit">–</div>
    <div class="price">price <b id="price">–</b></div>
  </div>

  <div class="signal-card" id="signalCard">
    <div class="signal-label">Signal</div>
    <div class="signal-main">
      <div class="signal-text none" id="signalText">Waiting for data…</div>
      <div class="badge off" id="signalBadge">FLAT</div>
    </div>
    <div class="signal-reason" id="signalReason">Needs digits 0,1,2,3 all under 10% to fire.</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    <span id="sampleCount">n = 0</span>
    <span>Powered by Deriv</span>
  </div>

</div>

<script>
const THRESHOLD = 10;          // percent
const TARGET_DIGITS = [0,1,2,3];

// Fallback list used only if the active_symbols call itself fails
// (e.g. network hiccup) — never used to *force* a request, only as
// a last-resort default set to populate the dropdown from.
const FALLBACK_SYMBOLS = [
  {symbol:'R_10',  display_name:'Volatility 10 Index'},
  {symbol:'R_25',  display_name:'Volatility 25 Index'},
  {symbol:'R_50',  display_name:'Volatility 50 Index'},
  {symbol:'R_75',  display_name:'Volatility 75 Index'},
  {symbol:'R_100', display_name:'Volatility 100 Index'},
];

const state = {
  symbol: null,          // set only once we know it's real
  windowSize: 100,
  digits: [],
  counts: new Array(10).fill(0),
  ws: null,
  symbolsLoaded: false,
};

const el = {
  dot: document.getElementById('dot'),
  statusText: document.getElementById('statusText'),
  lastDigit: document.getElementById('lastDigit'),
  price: document.getElementById('price'),
  signalCard: document.getElementById('signalCard'),
  signalText: document.getElementById('signalText'),
  signalBadge: document.getElementById('signalBadge'),
  signalReason: document.getElementById('signalReason'),
  grid: document.getElementById('grid'),
  sampleCount: document.getElementById('sampleCount'),
  symbolSel: document.getElementById('symbol'),
  sampleSel: document.getElementById('sampleSize'),
};

// build the 0-9 grid cells once
const cells = [];
for(let d=0; d<10; d++){
  const c = document.createElement('div');
  c.className = 'cell';
  c.innerHTML = `<div class="d">${d}</div><div class="p" id="pct-${d}">–</div>`;
  el.grid.appendChild(c);
  cells.push(c);
}

function getLastDigitSignal(digitPercentages){
  const allUnder = TARGET_DIGITS.every(d => digitPercentages[d] < THRESHOLD);
  if(!allUnder){
    const offenders = TARGET_DIGITS.filter(d => digitPercentages[d] >= THRESHOLD);
    return { signal:null, reason:`Digit(s) ${offenders.join(', ')} at/above ${THRESHOLD}% — condition not met.` };
  }
  let lowestDigit = TARGET_DIGITS[0];
  let lowestPct = digitPercentages[TARGET_DIGITS[0]];
  for(const d of TARGET_DIGITS){
    if(digitPercentages[d] < lowestPct){ lowestPct = digitPercentages[d]; lowestDigit = d; }
  }
  return {
    signal:'OVER',
    digit:lowestDigit,
    percentage:lowestPct,
    reason:`Digits 0–3 all under ${THRESHOLD}% — ${lowestDigit} is lowest at ${lowestPct.toFixed(1)}%.`
  };
}

function recompute(){
  const n = state.digits.length;
  el.sampleCount.textContent = `n = ${n}`;
  if(n === 0) return;

  const pct = state.counts.map(c => (c / n) * 100);

  for(let d=0; d<10; d++){
    cells[d].classList.remove('eligible','picked');
    document.getElementById(`pct-${d}`).textContent = pct[d].toFixed(1) + '%';
    if(TARGET_DIGITS.includes(d) && pct[d] < THRESHOLD) cells[d].classList.add('eligible');
  }

  const pctMap = {};
  for(let d=0; d<10; d++) pctMap[d] = pct[d];
  const result = getLastDigitSignal(pctMap);

  if(result.signal){
    el.signalCard.classList.add('active');
    el.signalText.classList.remove('none');
    el.signalText.innerHTML = `Buy <span class="digit">OVER ${result.digit}</span>`;
    el.signalBadge.textContent = 'FIRING';
    el.signalBadge.classList.remove('off');
    cells[result.digit].classList.add('picked');
  } else {
    el.signalCard.classList.remove('active');
    el.signalText.classList.add('none');
    el.signalText.textContent = 'No signal';
    el.signalBadge.textContent = 'FLAT';
    el.signalBadge.classList.add('off');
  }
  el.signalReason.textContent = result.reason;
}

function onTick(quote){
  const priceStr = quote.toString();
  el.price.innerHTML = `<b>${priceStr}</b>`;
  const digitStr = priceStr.replace('.', '');
  const digit = parseInt(digitStr[digitStr.length - 1], 10);
  el.lastDigit.textContent = digit;

  state.digits.push(digit);
  state.counts[digit]++;
  if(state.digits.length > state.windowSize){
    const removed = state.digits.shift();
    state.counts[removed]--;
  }
  recompute();
}

function resetSeries(){
  state.digits = [];
  state.counts = new Array(10).fill(0);
  recompute();
}

// --- Populate the symbol dropdown from whatever the server actually
// reports as tradeable, instead of a hardcoded guess. This is what
// fixes "Symbol R_75 is invalid" style errors for good: we only ever
// subscribe to a symbol the API just told us exists. ---
function populateSymbolDropdown(symbolList){
  const synthetics = symbolList
    .filter(s => s.market === 'synthetic_index')
    .sort((a,b) => a.display_name.localeCompare(b.display_name));

  const list = synthetics.length ? synthetics : symbolList;
  if(!list.length) return false;

  el.symbolSel.innerHTML = '';
  list.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.symbol;
    opt.textContent = s.display_name || s.symbol;
    el.symbolSel.appendChild(opt);
  });

  // Prefer a Volatility 75-ish default if present, else first item
  const preferred = list.find(s => s.symbol === 'R_75') || list[0];
  el.symbolSel.value = preferred.symbol;
  el.symbolSel.disabled = false;
  state.symbol = preferred.symbol;
  state.symbolsLoaded = true;
  return true;
}

let pingTimer = null;
let reconnectTimer = null;
let reconnectDelay = 1000; // backs off up to 15s

function clearTimers(){
  if(pingTimer){ clearInterval(pingTimer); pingTimer = null; }
  if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
}

function scheduleReconnect(){
  clearTimers();
  el.statusText.textContent = `reconnecting in ${Math.round(reconnectDelay/1000)}s`;
  reconnectTimer = setTimeout(() => {
    reconnectDelay = Math.min(reconnectDelay * 1.6, 15000);
    connect();
  }, reconnectDelay);
}

function subscribeToSymbol(ws, symbol){
  ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
}

function connect(){
  if(state.ws){ try{ state.ws.close(); }catch(e){} }
  clearTimers();
  el.dot.classList.remove('live');
  el.statusText.textContent = 'connecting';

  let ws;
  try{
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
  } catch(err){
    el.statusText.textContent = 'socket blocked: ' + err.message;
    scheduleReconnect();
    return;
  }
  state.ws = ws;

  ws.onopen = () => {
    reconnectDelay = 1000; // reset backoff on a clean connect

    if(!state.symbolsLoaded){
      // Ask the server what's actually tradeable before subscribing
      // to anything. This is the fix: never guess a symbol code.
      el.statusText.textContent = 'loading symbols…';
      ws.send(JSON.stringify({ active_symbols: 'brief', product_type: 'basic' }));
    } else {
      subscribeToSymbol(ws, state.symbol);
    }

    pingTimer = setInterval(() => {
      if(ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ ping: 1 }));
    }, 25000);
  };

  ws.onmessage = (msg) => {
    let data;
    try{ data = JSON.parse(msg.data); } catch(e){ return; }

    if(data.msg_type === 'active_symbols' && data.active_symbols){
      const ok = populateSymbolDropdown(data.active_symbols);
      if(!ok){
        el.statusText.textContent = 'no symbols returned';
        return;
      }
      subscribeToSymbol(ws, state.symbol);
      return;
    }

    if(data.msg_type === 'tick' && data.tick){
      if(data.tick.symbol !== state.symbol) return; // stale tick from a previous subscription
      el.dot.classList.add('live');
      el.statusText.textContent = state.symbol;
      onTick(data.tick.quote);
    }
    if(data.msg_type === 'ping'){
      // keepalive ack, nothing to do
    }
    if(data.error){
      el.dot.classList.remove('live');
      el.statusText.textContent = 'error: ' + data.error.message;

      // If our chosen symbol was rejected, fall back to the static
      // list so the tool degrades gracefully instead of hanging.
      if(!state.symbolsLoaded){
        const ok = populateSymbolDropdown(FALLBACK_SYMBOLS);
        if(ok) subscribeToSymbol(ws, state.symbol);
      }
    }
  };

  ws.onclose = (ev) => {
    el.dot.classList.remove('live');
    el.statusText.textContent = `disconnected (${ev.code})`;
    scheduleReconnect();
  };

  ws.onerror = () => {
    el.statusText.textContent = 'connection error';
    // onclose fires right after this and handles the reconnect
  };
}

el.symbolSel.addEventListener('change', (e) => {
  const newSymbol = e.target.value;
  if(!newSymbol) return;
  resetSeries();

  if(state.ws && state.ws.readyState === WebSocket.OPEN){
    state.ws.send(JSON.stringify({ forget_all: 'ticks' }));
    state.symbol = newSymbol;
    subscribeToSymbol(state.ws, state.symbol);
    el.statusText.textContent = state.symbol;
  } else {
    state.symbol = newSymbol;
    connect();
  }
});
el.sampleSel.addEventListener('change', (e) => {
  state.windowSize = parseInt(e.target.value, 10);
  resetSeries();
});

state.windowSize = parseInt(el.sampleSel.value, 10);
connect();
</script>
</body>
</html>
